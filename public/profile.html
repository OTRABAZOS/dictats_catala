<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — Dictats en Català</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        Dictats en Català
      </div>
      <div class="user-info">
        <a href="/" class="btn btn-ghost btn-sm">← Tornar</a>
        <button class="btn btn-ghost btn-sm" id="btn-logout">Sortir</button>
      </div>
    </header>

    <main class="app-main">
      <h2 style="font-size:1.25rem;font-weight:600;margin-bottom:24px;letter-spacing:-.02em">El meu perfil</h2>

      <div id="profile-loading" style="text-align:center;padding:48px;color:var(--text-muted)">
        <div class="spinner" style="margin:0 auto 12px"></div>
        Carregant historial…
      </div>

      <div id="profile-content" style="display:none">
        <!-- Stats -->
        <div class="stats-grid" id="stats-grid"></div>

        <!-- History -->
        <div class="card">
          <div class="card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="card-title">Historial de dictats</span>
          </div>
          <div class="card-body" style="padding:0">
            <div id="history-list"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    async function init() {
      const res = await fetch('/api/profile');
      if (!res.ok) { window.location.href = '/login'; return; }
      const data = await res.json();

      document.getElementById('profile-loading').style.display = 'none';
      document.getElementById('profile-content').style.display = '';

      // Stats
      const scaleForAvg = errCount => {
        if (errCount === 0) return 'Excel·lent';
        if (errCount <= 2) return 'Molt bé';
        if (errCount <= 5) return 'Bé';
        if (errCount <= 9) return 'Progressant';
        return 'Segueix!';
      };

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${data.stats.total}</div>
          <div class="stat-label">Dictats fets</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${data.stats.bestErrors ?? '—'}</div>
          <div class="stat-label">Millor resultat (errors)</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${data.stats.avgErrors}</div>
          <div class="stat-label">Mitjana d'errors</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="font-size:1.25rem">${scaleForAvg(data.stats.avgErrors)}</div>
          <div class="stat-label">Nivell general</div>
        </div>
      `;

      // History list
      if (data.history.length === 0) {
        document.getElementById('history-list').innerHTML =
          '<div style="padding:24px;color:var(--text-muted);font-size:.875rem">Encara no has fet cap dictado.</div>';
        return;
      }

      const levelLabel = { basic:'Bàsic', intermedi:'Intermedi', avancat:'Avançat', personal:'Personal', unknown:'—' };

      document.getElementById('history-list').innerHTML = data.history.map(r => `
        <div class="history-item">
          <div class="history-meta">
            <span class="history-title">${r.text_title || r.text_id}</span>
            <span class="history-level">${levelLabel[r.level] || r.level}</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="scale-badge ${r.scale.cls}">${r.scale.label}</span>
            <span class="history-errors">${r.errors_count} error${r.errors_count !== 1 ? 's' : ''}</span>
            <span class="history-date">${new Date(r.completed_at).toLocaleDateString('ca-ES', {day:'2-digit',month:'short',year:'numeric'})}</span>
          </div>
        </div>
      `).join('');

      document.getElementById('btn-logout').addEventListener('click', async () => {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login';
      });
    }

    init();
  </script>
</body>
</html>
