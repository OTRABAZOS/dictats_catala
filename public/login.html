<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictats en Català — Accés</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page-center">
    <div class="login-box">
      <div class="login-logo">
        <h1>Dictats en Català</h1>
        <p>Aprèn i millora la teva ortografia</p>
      </div>

      <div class="card">
        <div class="card-body">
          <div id="alert" class="alert alert-error" style="display:none"></div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="login-email" class="form-input" placeholder="el-teu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Contrasenya</label>
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button class="btn btn-primary btn-block btn-lg" id="btn-login">Entrar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const alertEl = document.getElementById('alert');
    function showAlert(msg) { alertEl.textContent = msg; alertEl.style.display = 'flex'; }

    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showAlert('Omple tots els camps');
      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'Entrant…';
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (res.ok) { window.location.href = '/'; }
      else { showAlert(data.error || 'Error desconegut'); btn.disabled = false; btn.textContent = 'Entrar'; }
    }

    document.getElementById('btn-login').addEventListener('click', login);
    ['login-email', 'login-password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    });
  </script>
</body>
</html>
